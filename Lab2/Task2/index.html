<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Instagram</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<img src="https://1000logos.net/wp-content/uploads/2017/02/Instagram-Logosu.png" alt="Instagram Logo" class="insta-logo">
    <div class="container">
        <div class="left">
            <p class="left-text">Посмотрите, какими моментами из<br>жизни поделились ваши близкие друзья.</p>
            <img src="https://static.cdninstagram.com/rsrc.php/v4/yt/r/pAv7hjq-51n.png" alt="Instagram Phone" class="left-img">
        </div>

        <div class="divider"></div>

        <div class="right">
            <div class="login-box">
                <h2 class="login-title">Войдите в Instagram</h2>
                <form>
                    <input type="text" placeholder="Имя пользователя, номер мобильного или электронный адрес">
                    <input type="password" placeholder="Пароль">
                    <button type="submit">Войти</button>
                </form>
                <a href="#" class="forgot">Забыли пароль?</a>
                <button class="fb-btn">
                    <img src="https://freepngimg.com/thumb/facebook/141246-logo-circle-facebook-picture-free-transparent-image-hd-thumb.png" alt="Facebook Logo" class="facebook-logo">
                    Войдите через Facebook
                </button>
                <button class="signup-btn">Создайте новый аккаунт</button>
                <img src="https://brandlogovector.com/wp-content/uploads/2021/11/Meta-New-Facebook-Logo-Small.png" alt="Facebook Logo" class="meta-logo">
            </div>
        </div>
    </div>
</body>
</html>
