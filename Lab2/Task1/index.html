<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Facebook</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <div class="left">
      <img src="https://1000logos.net/wp-content/uploads/2016/11/Facebook-Logo-2019.png" alt="Facebook Logo" class="logo">
      <p class="subtitle">Facebook помогает вам всегда<br>оставаться на связи и общаться со<br>своими знакомыми</p>
    </div>

    <div class="right">
      <div class="login-box">
        <form>
          <label for="email"></label>
          <input type="email" name="email" id="email" placeholder="Электронный адрес" required>
          <label for="password"></label>
          <input type="password" name="password" id="password" placeholder="Пароль" required>
          <button type="submit">Вход</button>
        </form>

        <div class="links">
          <a href="#" class="forgot">Забыли пароль?</a>
          <hr>
          <a href="#" class="create">Создать новый аккаунт</a>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
